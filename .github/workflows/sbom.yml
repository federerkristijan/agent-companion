name: SBOM & Security Scan

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  sbom-npm:
    name: SBOM & Scan — Mobile (npm)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./mobile
          artifact-name: sbom-npm.cdx.json
          output-file: sbom-npm.cdx.json
          format: cyclonedx-json

      - name: Scan with grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype sbom:sbom-npm.cdx.json --fail-on high

      - name: npm audit
        working-directory: mobile
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-npm
          path: sbom-npm.cdx.json

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3
        with:
          extra_args: --only-verified
