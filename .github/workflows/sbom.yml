name: SBOM & Security Scan

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  sbom-npm:
    name: SBOM & Scan — Mobile (npm)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./mobile
          artifact-name: sbom-npm.cdx.json
          output-file: sbom-npm.cdx.json
          format: cyclonedx-json

      - name: Scan with grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype sbom:sbom-npm.cdx.json --fail-on high

      - name: npm audit
        working-directory: mobile
        run: npm audit --omit=dev --audit-level=high

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-npm
          path: sbom-npm.cdx.json

  sbom-python:
    name: SBOM & Scan — Agents (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: agents
        run: uv sync

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./agents
          artifact-name: sbom-python.cdx.json
          output-file: sbom-python.cdx.json
          format: cyclonedx-json

      - name: Scan with grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype sbom:sbom-python.cdx.json --fail-on high

      - name: pip-audit
        working-directory: agents
        run: |
          sudo apt-get install -y libxml2-dev libxslt-dev
          uv export --no-dev --frozen -o /tmp/requirements.txt
          pip install pip-audit
          pip-audit -r /tmp/requirements.txt

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-python
          path: sbom-python.cdx.json

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3
        with:
          extra_args: --only-verified
