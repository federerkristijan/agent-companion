name: SBOM & Security Scan

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  sbom-npm:
    name: SBOM & Scan — Mobile (npm)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./mobile
          artifact-name: sbom-npm.cdx.json
          output-file: sbom-npm.cdx.json
          format: cyclonedx-json

      - name: Scan with grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype sbom:sbom-npm.cdx.json --fail-on high

      - name: npm audit
        working-directory: mobile
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-npm
          path: sbom-npm.cdx.json

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3
        with:
          extra_args: --only-verified
