name: Chat Complex Task

on:
  workflow_dispatch:
    inputs:
      message_id:
        description: 'ID of the triggering user message'
        required: true
        type: string
      task_type:
        description: 'Classified task type (blog, feature, etc.)'
        required: true
        type: string

permissions: read-all

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: agents
        run: uv sync

      - name: Run Input Agent
        working-directory: agents
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          MESSAGE_ID: ${{ inputs.message_id }}
          TASK_TYPE: ${{ inputs.task_type }}
          PYTHONPATH: '${{ github.workspace }}/agents'
        run: uv run python tasks/input_agent.py
