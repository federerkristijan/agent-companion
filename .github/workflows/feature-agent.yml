name: Feature Agent

on:
  workflow_dispatch:
    inputs:
      task_description:
        description: 'What component to build (plain English)'
        required: true
        type: string
      component_name:
        description: 'PascalCase component name (e.g. HeroSection)'
        required: true
        type: string
      target_page:
        description: 'Page file to wire the component into (e.g. src/app/page.tsx)'
        required: false
        default: 'src/app/page.tsx'
        type: string

permissions: read-all

jobs:
  run-feature-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: agents
        run: uv sync

      - name: Run Feature Agent
        working-directory: agents
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK_DESCRIPTION: ${{ inputs.task_description }}
          COMPONENT_NAME: ${{ inputs.component_name }}
          TARGET_PAGE: ${{ inputs.target_page }}
          PYTHONPATH: '${{ github.workspace }}/agents'
        run: uv run python tasks/feature_agent.py
